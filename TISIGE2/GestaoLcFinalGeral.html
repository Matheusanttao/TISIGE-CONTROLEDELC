<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Gestão geral — LC final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="tisige-theme.css">
</head>
<body>
    <div class="tg-page">
        <div class="tg-title-block">
            <h1><i class="fa-solid fa-table-list" aria-hidden="true"></i> Gestão LC final</h1>
            <p class="tg-sub">Todos os registros de LCs finais</p>
        </div>

        <div class="tg-search">
            <label for="busca-lc" class="visually-hidden">Pesquisar</label>
            <input type="search" id="busca-lc" placeholder="Pesquisar por OS ou data..." autocomplete="off">
            <button type="button" class="tg-btn tg-btn--primary" id="btn-buscar"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
        </div>

        <div style="display:flex; flex-wrap:wrap; gap:0.75rem; justify-content:center; margin-bottom:1.25rem;">
            <a href="Index.php" class="tg-btn tg-btn--ghost"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </div>

        <div class="tg-table-wrap">
            <table class="tg-table" id="nova-tabela">
                <thead>
                    <tr>
                        <th scope="col">OS</th>
                        <th scope="col">Limite testes finais</th>
                        <th scope="col">Limite LC ao PCP</th>
                        <th scope="col">Limite LC ao comercial</th>
                        <th scope="col">Finalizado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>17242</td>
                        <td>2024-02-15</td>
                        <td>2024-02-20</td>
                        <td>2024-02-25</td>
                        <td class="status-checkbox"></td>
                    </tr>
                    <tr>
                        <td>17232</td>
                        <td>2024-03-10</td>
                        <td>2024-03-15</td>
                        <td>2024-03-20</td>
                        <td class="status-checkbox"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll(".status-checkbox").forEach(function (cell) {
                if (cell.textContent.trim() === "") {
                    var checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.setAttribute("aria-label", "Marcar como finalizado");
                    cell.appendChild(checkbox);
                }
            });

            var input = document.getElementById("busca-lc");
            var table = document.getElementById("nova-tabela");
            function filtrar() {
                var q = (input.value || "").toLowerCase().trim();
                table.querySelectorAll("tbody tr").forEach(function (row) {
                    var text = row.textContent.toLowerCase();
                    row.style.display = !q || text.indexOf(q) !== -1 ? "" : "none";
                });
            }
            document.getElementById("btn-buscar").addEventListener("click", filtrar);
            input.addEventListener("input", filtrar);
        });
    </script>
    <style>
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</body>
</html>
